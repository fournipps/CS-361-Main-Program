<!DOCTYPE html>
<html>
  <head>
    <title>Backstage Records</title>
    <link rel="icon" type="image/x-icon" href="icons/favicon.png">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/checkout.css">
    <link rel="stylesheet" href="styles/cart.css">
    <script src="scripts/website+vinyl.js" type="module"></script>
    <script src="scripts/checkout.js" type="module"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="website-title">
          <h1>Backstage Records</h1>
        </div>
          <!-- The overlay -->
        <div id="myNav" class="overlay">

          <!-- Button to close the overlay navigation -->
          <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>

          <!-- Overlay content -->
          <div class="overlay-content">
            <a href="01-home-page.html">Home</a>
            <a href="02-vinyl-page.html">Vinyl</a>
            <a href="03-cd-page.html">CD</a>
        <!--<a href="04-merch-page.html">Merch</a>-->
            <a href="faq-page.html">FAQ</a>
            <a href="contact-us-page.html">Contact Us</a>
          </div>

        </div>

        <!-- Use any element to open/show the overlay navigation menu -->
        <span class="hamburger" onclick="openNav()"><img class="hamburger-icon" src="icons/hamburger.png"></span>
        
        <div class="icon-cart">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312"/>
          </svg>
          <span class="cart-quantity">0</span>
        </div>
      </div>
    </div>

    <div class="cartTab">
      <h1>Shopping Cart</h1>
      <div class="listCart">
        show item here
      </div>

      <div class="cartTotalBox">
        <strong>Cart Total:</strong>
        <span id="cartTotal">$0</span>
      </div>

      <div class="btn">
        <button class="close">CLOSE</button>
        <button class="checkOut">
          Check Out
        </button>
      </div>
    </div>

    <main class="checkoutPage">
      <section class="checkoutFormSection">
        <h1>Checkout</h1>

        <form id="checkoutForm">
          <h2>Contact Information</h2>

          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" />

          <h2>Shipping Address</h2>

          <label for="address1">Address Line 1</label>
          <input type="text" id="address1" name="address1" required />

          <label for="address2">Address Line 2</label>
          <input type="text" id="address2" name="address2" />

          <label for="city">City</label>
          <input type="text" id="city" name="city" required />

          <label for="state">State</label>
          <input type="text" id="state" name="state" required />

          <label for="zip">ZIP Code</label>
          <input type="text" id="zip" name="zip" required />

          <h2>Payment</h2>

          <label for="cardName">Name on Card</label>
          <input type="text" id="cardName" name="cardName" required />

          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" name="cardNumber" required />

          <label for="expDate">Expiration Date</label>
          <input type="text" id="expDate" name="expDate" placeholder="MM/YY" required />

          <label for="cvv">CVV</label>
          <input type="text" id="cvv" name="cvv" required />

          <div class="checkoutButtons">
            <button type="button" id="backToCartBtn">Back to Store</button>
            <button type="submit">Place Order</button>
          </div>
        </form>
      </section>

      <aside class="orderSummarySection">
        <h2>Order Summary</h2>

        <div id="checkoutItems" class="checkoutItems"></div>

        <div class="summaryRow">
          <span>Items</span>
          <span id="checkoutItemCount">0</span>
        </div>

        <div class="summaryRow">
          <span>Total</span>
          <span id="checkoutTotal">$0</span>
        </div>
      </aside>
    </main>
    
    <div class="footer">
      <a href="faq-page.html">
        <div class="faq-button">
          FAQ
        </div>
      </a>

      <a href="contact-us-page.html">
        <div class="contact-us-button">
          Contact Us
        </div>
      </a>
    </div>
  </body>
</html>
